@if (modal.confirmOptions()) {
  <div class="backdrop" @backdropIn (click)="cancel()">
    <div class="dialog" @dialogIn (click)="$event.stopPropagation()">
      <div class="dialog-icon" [class.dialog-icon--danger]="modal.confirmOptions()!.danger">
        @if (modal.confirmOptions()!.danger) {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        }
      </div>

      <h3 class="dialog-title">{{ modal.confirmOptions()!.title }}</h3>
      <p class="dialog-message">{{ modal.confirmOptions()!.message }}</p>

      <div class="dialog-actions">
        <button class="btn btn-ghost" (click)="cancel()">
          {{ modal.confirmOptions()!.cancelLabel || 'Cancel' }}
        </button>
        <button class="btn" [class.btn-danger]="modal.confirmOptions()!.danger"
                [class.btn-primary]="!modal.confirmOptions()!.danger"
                (click)="confirm()">
          {{ modal.confirmOptions()!.confirmLabel || 'Confirm' }}
        </button>
      </div>
    </div>
  </div>
}
