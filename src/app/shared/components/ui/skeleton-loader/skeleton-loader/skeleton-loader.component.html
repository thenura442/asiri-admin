@switch (type()) {
  @case ('table') {
    <div class="sk-table">
      <div class="sk-table-head">
        @for (col of [1,2,3,4,5]; track col) {
          <div class="sk-cell sk-shimmer"></div>
        }
      </div>
      @for (row of rowArray; track $index) {
        <div class="sk-table-row">
          <div class="sk-cell sk-cell--avatar sk-shimmer"></div>
          <div class="sk-cell sk-shimmer" style="width:60%"></div>
          <div class="sk-cell sk-shimmer" style="width:40%"></div>
          <div class="sk-cell sk-shimmer" style="width:30%"></div>
          <div class="sk-cell sk-shimmer" style="width:20%"></div>
        </div>
      }
    </div>
  }
  @case ('cards') {
    <div class="sk-cards">
      @for (row of rowArray; track $index) {
        <div class="sk-card">
          <div class="sk-card-head sk-shimmer"></div>
          <div class="sk-card-line sk-shimmer" style="width:70%"></div>
          <div class="sk-card-line sk-shimmer" style="width:50%"></div>
        </div>
      }
    </div>
  }
  @case ('form') {
    <div class="sk-form">
      @for (row of rowArray; track $index) {
        <div class="sk-field">
          <div class="sk-label sk-shimmer"></div>
          <div class="sk-input sk-shimmer"></div>
        </div>
      }
    </div>
  }
  @default {
    <div class="sk-list">
      @for (row of rowArray; track $index) {
        <div class="sk-list-item">
          <div class="sk-dot sk-shimmer"></div>
          <div class="sk-line sk-shimmer"></div>
        </div>
      }
    </div>
  }
}
