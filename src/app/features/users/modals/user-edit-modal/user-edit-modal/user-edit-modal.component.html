<div class="backdrop" (click)="close()">
  <div class="modal md" (click)="$event.stopPropagation()">

    <div class="m-head">
      <div class="m-head-l">
        <div class="m-head-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div class="m-head-text">
          <h2>Edit User</h2>
          <p>Update account details for {{ fullName() }}</p>
        </div>
      </div>
      <button class="m-close" (click)="close()" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="m-body">

      <div class="fg-row">
        <div class="fg">
          <label class="fl">Full Name <span class="req">*</span></label>
          <input class="fi"
                 [class.fi--error]="errors()['fullName']"
                 [value]="fullName()"
                 (input)="onFullName($any($event.target).value)"/>
          @if (errors()['fullName']) {
            <span class="field-error">{{ errors()['fullName'] }}</span>
          }
        </div>
        <div class="fg">
          <label class="fl">NIC</label>
          <input class="fi fi-mono" [value]="nic()" (input)="onNic($any($event.target).value)"/>
        </div>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label class="fl">Phone</label>
          <input class="fi" type="tel" [value]="phone()" (input)="onPhone($any($event.target).value)"/>
        </div>
        <div class="fg">
          <label class="fl">Role <span class="req">*</span></label>
          <app-custom-dropdown
            [options]="roleOptions"
            [value]="role()"
            [class.fi--error]="errors()['role']"
            placeholder="Select role..."
            (changed)="onRole($event)">
          </app-custom-dropdown>
          @if (errors()['role']) {
            <span class="field-error">{{ errors()['role'] }}</span>
          }
        </div>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label class="fl">Branch <span class="req">*</span></label>
          <app-custom-dropdown
            [options]="branchOptions()"
            [value]="branchId()"
            [class.fi--error]="errors()['branchId']"
            placeholder="Select branch..."
            [searchable]="true"
            (changed)="onBranch($event)">
          </app-custom-dropdown>
          @if (errors()['branchId']) {
            <span class="field-error">{{ errors()['branchId'] }}</span>
          }
        </div>
        <div class="fg">
          <label class="fl">Account Status</label>
          <div class="radio-row">
            <button class="radio-pill" [class.active]="status() === 'active'"
                    (click)="status.set('active')" type="button">Active</button>
            <button class="radio-pill" [class.active]="status() === 'inactive'"
                    (click)="status.set('inactive')" type="button">Inactive</button>
            <button class="radio-pill radio-pill--danger" [class.active]="status() === 'suspended'"
                    (click)="status.set('suspended')" type="button">Suspended</button>
          </div>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Two-Factor Authentication</label>
        <div class="toggle-row-inline">
          <label class="toggle">
            <input type="checkbox" [checked]="twoFactorEnabled()"
                   (change)="twoFactorEnabled.set($any($event.target).checked)"/>
            <span class="toggle-track"></span>
          </label>
          <span class="toggle-label-text">
            {{ twoFactorEnabled() ? 'Enabled — required on login' : 'Disabled' }}
          </span>
        </div>
      </div>

      <div class="reset-pw-row">
        <button class="btn btn-outline-blue" (click)="resetPassword()"
                [disabled]="isSaving() || isDeleting()" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          Send Password Reset Email
        </button>
      </div>

    </div>

    <div class="m-foot">
      <button class="btn btn-danger"
              (click)="confirmDelete()"
              [disabled]="isSaving() || isDeleting()"
              type="button">
        @if (isDeleting()) { Deleting... } @else { Delete User }
      </button>
      <div style="flex:1"></div>
      <button class="btn" (click)="close()"
              [disabled]="isSaving() || isDeleting()"
              type="button">Cancel</button>
      <button class="btn btn-primary" (click)="save()"
              [disabled]="isSaving() || isDeleting()"
              type="button">
        @if (isSaving()) {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
            <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/>
            <path d="M21 12a9 9 0 00-9-9"/>
          </svg>
          Saving...
        } @else {
          Update User
        }
      </button>
    </div>

  </div>
</div>
