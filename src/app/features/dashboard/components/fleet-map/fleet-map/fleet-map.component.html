<div class="map-bar">
  <div class="map-bar-left">
    <h3>Live Fleet Tracking</h3>
    <div class="live-chip">
      <div class="live-dot"></div>
      <span>Live</span>
    </div>
  </div>
  <div class="map-legend">
    <div class="legend-item">
      <i style="background:var(--sg)"></i>Active (5)
    </div>
    <div class="legend-item">
      <i style="background:var(--t5)"></i>Offline (2)
    </div>
    <div class="legend-item">
      <i style="background:var(--sa)"></i>Break (1)
    </div>
  </div>
</div>

<div class="map-container">
  <div class="map-float-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input placeholder="Locate vehicle..." autocomplete="off"/>
  </div>
  <div id="fleet-map"></div>
</div>
