<div class="notif-card">
  <div class="notif-head">
    <div class="notif-head-left">
      <h3>Notifications</h3>
      @if (unreadCount() > 0) {
        <span class="notif-count">{{ unreadCount() }}</span>
      }
    </div>
    <div class="notif-tabs">
      <button class="notif-tab" [class.notif-tab--active]="activeTab() === 'all'"
              (click)="setTab('all')" type="button">All</button>
      <button class="notif-tab" [class.notif-tab--active]="activeTab() === 'system'"
              (click)="setTab('system')" type="button">System</button>
      <button class="notif-tab" [class.notif-tab--active]="activeTab() === 'jobs'"
              (click)="setTab('jobs')" type="button">Jobs</button>
    </div>
  </div>

  <div class="notif-list">
    @for (n of notifications(); track n.id) {
      <div class="notif-item" [class.notif-item--unread]="!n.isRead">
        <div class="notif-dot" [style.background]="n.dotColor"></div>
        <div class="notif-body">
          <div class="notif-title">{{ n.title }}</div>
          <div class="notif-sub">{{ n.message }}</div>
          <div class="notif-time">{{ n.createdAt | timeAgo }}</div>
        </div>
      </div>
    }
  </div>

  <a routerLink="/notifications" class="notif-all">
    View all notifications
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </a>
</div>
