<div class="backdrop" (click)="close()">
  <div class="modal sm" (click)="$event.stopPropagation()">

    <div class="m-head">
      <div class="m-head-l">
        <div class="m-head-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div class="m-head-text">
          <h2>Edit Vehicle</h2>
          <p>Update vehicle details and status</p>
        </div>
      </div>
      <button class="m-close" (click)="close()" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="m-body">

      <div class="fg-row">
        <div class="fg">
          <label class="fl">Plate Number <span class="req">*</span></label>
          <input class="fi fi-mono"
                 [class.fi--error]="errors()['plateNumber']"
                 [value]="plateNumber()"
                 (input)="onPlateNumber($any($event.target).value)"/>
          @if (errors()['plateNumber']) {
            <span class="field-error">{{ errors()['plateNumber'] }}</span>
          }
        </div>
        <div class="fg">
          <label class="fl">Chassis Number <span class="req">*</span></label>
          <input class="fi fi-mono"
                 [class.fi--error]="errors()['chassisNumber']"
                 [value]="chassisNumber()"
                 (input)="onChassisNumber($any($event.target).value)"/>
          @if (errors()['chassisNumber']) {
            <span class="field-error">{{ errors()['chassisNumber'] }}</span>
          }
        </div>
      </div>

      <div class="fg-row">
        <div class="fg">
          <label class="fl">Vehicle Type <span class="req">*</span></label>
          <select class="fi" [value]="type()" (change)="type.set($any($event.target).value)">
            <option value="van">Van</option>
            <option value="car">Car</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Status <span class="req">*</span></label>
          <select class="fi" [value]="status()" (change)="status.set($any($event.target).value)">
            <option value="available">Available</option>
            <option value="busy">Busy</option>
            <option value="offline">Offline</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Notes</label>
        <textarea class="fi"
                  [value]="notes()"
                  (input)="notes.set($any($event.target).value)"
                  placeholder="Optional notes about this vehicle..."
                  style="min-height:70px"></textarea>
      </div>

    </div>

    <div class="m-foot">
      <button class="btn btn-danger"
              (click)="confirmDelete()"
              [disabled]="isSaving() || isDeleting()"
              type="button">
        @if (isDeleting()) { Deleting... } @else { Delete Vehicle }
      </button>
      <div style="flex:1"></div>
      <button class="btn" (click)="close()"
              [disabled]="isSaving() || isDeleting()"
              type="button">Cancel</button>
      <button class="btn btn-primary"
              (click)="save()"
              [disabled]="isSaving() || isDeleting()"
              type="button">
        @if (isSaving()) { Saving... } @else { Update Vehicle }
      </button>
    </div>

  </div>
</div>
