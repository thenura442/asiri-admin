<div class="backdrop" (click)="close()">
  <div class="modal sm" (click)="$event.stopPropagation()">

    <div class="m-head">
      <div class="m-head-l">
        <div class="m-head-ico red">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M15 9l-6 6M9 9l6 6"/>
          </svg>
        </div>
        <div class="m-head-text">
          <h2>Reject Request</h2>
          @if (jobNumber()) {
            <p>Rejecting request #{{ jobNumber() }}</p>
          }
        </div>
      </div>
      <button class="m-close" (click)="close()" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="m-body">

      <div class="fg">
        <label class="fl">Rejection Reason <span class="req">*</span></label>
        <select class="fi"
                [class.fi--error]="errors()['reason']"
                [value]="reason()"
                (change)="onReasonChange($any($event.target).value)">
          <option value="">Select reason...</option>
          @for (r of reasons; track r) {
            <option [value]="r">{{ r }}</option>
          }
        </select>
        @if (errors()['reason']) {
          <span class="field-error">{{ errors()['reason'] }}</span>
        }
      </div>

      <div class="fg">
        <label class="fl">Details <span class="req">*</span></label>
        <textarea class="fi"
                  [class.fi--error]="errors()['notes']"
                  [value]="notes()"
                  (input)="onNotesChange($any($event.target).value)"
                  placeholder="Provide additional details about the rejection..."
                  style="min-height:80px"></textarea>
        @if (errors()['notes']) {
          <span class="field-error">{{ errors()['notes'] }}</span>
        }
      </div>

    </div>

    <div class="m-foot">
      <button class="btn" (click)="close()"
              [disabled]="isSubmitting()" type="button">Cancel</button>
      <button class="btn btn-danger" (click)="submit()"
              [disabled]="isSubmitting()" type="button">
        @if (isSubmitting()) { Rejecting... } @else { Submit Rejection }
      </button>
    </div>

  </div>
</div>
